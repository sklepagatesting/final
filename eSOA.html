<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Gate</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}

h1 {
    font-size: 28px;
    text-align: center;
    max-width: 400px;
}

button {
    margin-top: 20px;
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    background: #16a34a;
    color: white;
    cursor: pointer;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.box {
    background: #151515;
    padding: 30px;
    border-radius: 12px;
    width: 400px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    text-align: center;
}

.shake {
    animation: shake 0.25s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-6px); }
    100% { transform: translateX(0); }
}
</style>
</head>

<body>

<h1 id="message"></h1>
<button id="proceedBtn" style="display:none;">Proceed Anyway</button>

<div class="modal" id="modal">
    <div class="box">
        <h3 id="q"></h3>
        <input id="a" placeholder="Answer...">
        <br><br>
        <button id="submit">Submit</button>
    </div>
</div>

<script>
// CHECK DAY
const today = new Date().getDay(); // 6 = Saturday
const message = document.getElementById("message");
const proceedBtn = document.getElementById("proceedBtn");

// IF NOT SATURDAY → AUTO REDIRECT
if (today !== 6) {
    window.location.href = "eSOAverified.html";
}

// IF SATURDAY → SHOW MESSAGE
if (today === 6) {
    message.innerText = "It's Jay day off today, come back again tomorrow";
    proceedBtn.style.display = "inline-block";
}

// QUESTIONS
const questions = [
"What was Jay's surname?",
"Where did Jay go to school?",
"What is Jay’s favorite snack?",
"Who is Jay’s closest friend?",
"What is Jay’s favorite drink?",
"What street did Jay grow up on?",
"What is Jay’s mother’s nickname?",
"What is Jay’s favorite color?",
"What was Jay’s first job?",
"What subject did Jay hate the most?",
"What is Jay’s favorite movie?",
"What does Jay usually order?",
"What is Jay’s favorite number?",
"What game did Jay play most?",
"What is Jay’s biggest fear?",
"What is Jay’s favorite music?",
"What is Jay’s dream place?",
"What is Jay’s favorite dessert?",
"What time does Jay sleep?",
"What is Jay’s zodiac sign?",
"What app does Jay use most?",
"What is Jay’s favorite sport?",
"What name does Jay use online?",
"What is Jay’s favorite holiday?",
"What brand does Jay like?",
"What makes Jay angry?",
"What is Jay’s best memory?",
"What does Jay eat for breakfast?",
"What is Jay’s outfit style?",
"What is Jay’s goal?",
"What does Jay do when bored?",
"What is Jay’s favorite site?",
"What phone does Jay use?",
"What subject does Jay like?",
"What chore does Jay hate?",
"What smell does Jay like?",
"What place relaxes Jay?",
"What fast food does Jay like?",
"What season does Jay like?",
"What quote does Jay like?",
"What talent does Jay have?",
"What hobby does Jay enjoy?",
"What word does Jay say often?",
"What does Jay do at night?",
"What toy did Jay love?",
"What site does Jay visit?",
"What snack does Jay like?",
"What memory stands out?",
"What purchase does Jay like?",
"What mood is Jay usually in?"
];

let index = 0;

// ELEMENTS
const modal = document.getElementById("modal");
const q = document.getElementById("q");
const a = document.getElementById("a");
const submit = document.getElementById("submit");

// OPEN QUESTIONS
proceedBtn.onclick = () => {
    modal.style.display = "flex";
    load();
};

// LOAD QUESTION
function load() {
    if (index >= questions.length) {
        q.innerText = "ACCESS DENIED";
        submit.disabled = true;
        return;
    }
    q.innerText = questions[index];
    a.value = "";
}

// SHAKE
function shake() {
    submit.classList.add("shake");
    setTimeout(() => submit.classList.remove("shake"), 250);
}

// SUBMIT
submit.onclick = () => {
    const val = a.value.trim().toLowerCase();

    if (val === "ford") {
        window.location.href = "eSOAverified.html";
        return;
    }

    shake();
    index++;
    load();
};

// CLOSE
window.onclick = (e) => {
    if (e.target === modal) modal.style.display = "none";
};
</script>

</body>
</html>
